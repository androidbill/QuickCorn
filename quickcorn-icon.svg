<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">QuickCorn score icon</title>
  <desc id="desc">A split red and blue app icon with a zero on the left and a one on the right.</desc>
  <defs>
    <clipPath id="icon-shape">
      <rect x="0" y="0" width="256" height="256" rx="56" ry="56" />
    </clipPath>
  </defs>
  <g clip-path="url(#icon-shape)">
    <rect x="0" y="0" width="128" height="256" fill="#e8332a" />
    <rect x="128" y="0" width="128" height="256" fill="#1a6fe8" />
    <rect x="124" y="0" width="8" height="256" fill="#ffffff" opacity="0.2" />
  </g>
  <rect x="4" y="4" width="248" height="248" rx="52" ry="52" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="8" />
  <text x="64" y="146" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="118" font-weight="900" fill="#ffffff">0</text>
  <text x="192" y="146" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="118" font-weight="900" fill="#ffffff">1</text>
</svg>
